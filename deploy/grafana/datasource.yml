apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: TimescaleDB
    type: postgres
    access: proxy
    url: timescaledb:5432
    database: noria_bearing
    user: noria
    secureJsonData:
      password: noria_secret
    jsonData:
      sslmode: disable
      postgresVersion: 1500
      timescaledb: true
    editable: true
