global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'noria-bearing-monitor'

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'noria-backend'
    static_configs:
      - targets: ['noria-backend:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'mqtt-broker'
    static_configs:
      - targets: ['mqtt-broker:9001']
    metrics_path: '/metrics'
    scrape_interval: 30s
